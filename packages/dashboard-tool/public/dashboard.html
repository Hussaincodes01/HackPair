<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HackPair Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
    .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 20px; color: #58a6ff; }
    .header .status { font-size: 12px; color: #8b949e; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
    .card h2 { font-size: 14px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
    .room { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; margin-bottom: 8px; }
    .room:hover { border-color: #58a6ff; }
    .room-name { font-weight: 600; font-size: 14px; }
    .room-meta { font-size: 12px; color: #8b949e; }
    .room-code { font-family: monospace; font-size: 14px; color: #3fb950; background: #0d1117; padding: 4px 8px; border-radius: 4px; border: 1px solid #30363d; }
    .member { display: flex; align-items: center; gap: 10px; padding: 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; margin-bottom: 8px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .member-name { font-size: 13px; flex: 1; }
    .member-file { font-size: 11px; color: #8b949e; font-family: monospace; }
    .activity { padding: 8px 0; border-bottom: 1px solid #21262d; font-size: 13px; }
    .activity:last-child { border-bottom: none; }
    .activity .time { color: #8b949e; font-size: 11px; margin-right: 8px; }
    .activity .event { color: #c9d1d9; }
    .activity .file { color: #58a6ff; font-family: monospace; }
    .empty { text-align: center; color: #8b949e; padding: 40px; font-size: 14px; }
    .stat { text-align: center; padding: 20px; }
    .stat .number { font-size: 36px; font-weight: 700; color: #58a6ff; }
    .stat .label { font-size: 12px; color: #8b949e; margin-top: 4px; }
    .invite { font-family: monospace; font-size: 16px; color: #3fb950; background: #0d1117; padding: 12px; border-radius: 6px; border: 1px solid #30363d; text-align: center; cursor: pointer; margin-top: 12px; word-break: break-all; }
    .invite:hover { border-color: #3fb950; }
    .copied { color: #3fb950; font-size: 12px; text-align: center; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚡ HackPair Dashboard</h1>
    <div class="status" id="status">Connecting...</div>
  </div>
  <div class="container">
    <div class="grid">
      <div class="card">
        <h2>Rooms</h2>
        <div id="rooms"><div class="empty">No active rooms</div></div>
      </div>
      <div class="card">
        <h2>Team Members</h2>
        <div id="members"><div class="empty">No members online</div></div>
      </div>
    </div>
    <div class="grid">
      <div class="card">
        <h2>Activity</h2>
        <div id="activity"><div class="empty">No activity yet</div></div>
      </div>
      <div class="card">
        <h2>Quick Invite</h2>
        <div id="inviteSection">
          <div class="empty">Create a room to get an invite link</div>
        </div>
        <div class="copied" id="copied">Copied to clipboard!</div>
      </div>
    </div>
    <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
      <div class="card"><div class="stat"><div class="number" id="statRooms">0</div><div class="label">Active Rooms</div></div></div>
      <div class="card"><div class="stat"><div class="number" id="statMembers">0</div><div class="label">Online Members</div></div></div>
      <div class="card"><div class="stat"><div class="number" id="statEvents">0</div><div class="label">Events Today</div></div></div>
    </div>
  </div>
  <script>
    const API = window.location.origin;
    let allRooms = [];
    let allMembers = [];
    let eventCount = 0;

    async function fetchRooms() {
      try {
        const res = await fetch(API + '/api/rooms');
        const rooms = await res.json();
        allRooms = rooms;
        renderRooms();
        document.getElementById('statRooms').textContent = rooms.length;
      } catch(e) { console.error(e); }
    }

    async function fetchRoomDetail(id) {
      try {
        const res = await fetch(API + '/api/rooms/' + id);
        return await res.json();
      } catch(e) { return null; }
    }

    function renderRooms() {
      const el = document.getElementById('rooms');
      if (allRooms.length === 0) { el.innerHTML = '<div class="empty">No active rooms</div>'; return; }
      el.innerHTML = allRooms.map(r => '<div class="room"><div><div class="room-name">' + esc(r.name) + '</div><div class="room-meta">' + (r.members?.length || 0) + ' members</div></div><div class="room-code">' + esc(r.inviteCode) + '</div></div>').join('');
    }

    async function fetchMembers() {
      const members = [];
      for (const room of allRooms) {
        const detail = await fetchRoomDetail(room.id);
        if (detail?.members) {
          detail.members.forEach(m => members.push({ ...m, roomName: room.name }));
        }
      }
      allMembers = members;
      renderMembers();
      document.getElementById('statMembers').textContent = members.length;
    }

    function renderMembers() {
      const el = document.getElementById('members');
      if (allMembers.length === 0) { el.innerHTML = '<div class="empty">No members online</div>'; return; }
      el.innerHTML = allMembers.map(m => '<div class="member"><div class="dot" style="background:' + esc(m.colour || '#666') + '"></div><div class="member-name">' + esc(m.displayName) + '</div><div class="member-file">' + esc(m.roomName) + '</div></div>').join('');
    }

    async function fetchActivity() {
      const events = [];
      for (const room of allRooms) {
        try {
          const res = await fetch(API + '/api/rooms/' + room.id + '/activity');
          const data = await res.json();
          if (data?.events) events.push(...data.events.map(e => ({ ...e, roomName: room.name })));
        } catch(e) {}
      }
      events.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      eventCount = events.length;
      document.getElementById('statEvents').textContent = eventCount;
      renderActivity(events.slice(0, 20));
    }

    function renderActivity(events) {
      const el = document.getElementById('activity');
      if (events.length === 0) { el.innerHTML = '<div class="empty">No activity yet</div>'; return; }
      el.innerHTML = events.map(e => '<div class="activity"><span class="time">' + new Date(e.timestamp).toLocaleTimeString() + '</span><span class="event">' + esc(e.type) + '</span> <span class="file">' + esc(e.filePath || '') + '</span></div>').join('');
    }

    function renderInvite() {
      if (allRooms.length === 0) { return; }
      const r = allRooms[0];
      const url = window.location.origin + '?room=' + r.inviteCode;
      document.getElementById('inviteSection').innerHTML = '<div style="font-size:12px;color:#8b949e;margin-bottom:8px">Share this link:</div><div class="invite" onclick="copyInvite(this, \'' + url + '\')">' + esc(url) + '</div>';
    }

    function copyInvite(el, url) {
      navigator.clipboard.writeText(url);
      document.getElementById('copied').style.display = 'block';
      setTimeout(() => document.getElementById('copied').style.display = 'none', 2000);
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    async function refresh() {
      await fetchRooms();
      await fetchMembers();
      await fetchActivity();
      renderInvite();
      document.getElementById('status').textContent = 'Connected · ' + allRooms.length + ' rooms · ' + allMembers.length + ' members';
    }

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
